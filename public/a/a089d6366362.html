<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>/projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0a0f;
  --surface:   #111118;
  --surface2:  #18181f;
  --border:    rgba(255,255,255,0.08);
  --border2:   rgba(255,255,255,0.14);
  --accent:    #e8ff47;
  --accent2:   #b8cc2a;
  --text:      #f0f0f0;
  --muted:     #666;
  --muted2:    #999;
  --done-col:  #2a2a35;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-mono);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: auto;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(12px);
  z-index: 100;
}

.logo {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--accent);
  cursor: pointer;
}

.logo span { color: var(--muted2); font-weight: 400; }

.header-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

select, button { font-family: var(--font-mono); font-size: 12px; }

.filter-select {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  padding: 7px 12px;
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s;
}

.filter-select:hover, .filter-select:focus { border-color: var(--accent); }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted2);
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
}

.btn:hover { border-color: var(--accent); color: var(--accent); }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #0a0a0f;
  font-weight: 500;
}

.btn-primary:hover { background: var(--accent2); border-color: var(--accent2); color: #0a0a0f; }

/* ── Projects overview ── */
.projects-view {
  padding: 40px 28px;
  max-width: 1100px;
  margin: 0 auto;
}

.projects-view h2 {
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 20px;
}

.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}

.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
}

.project-card:hover {
  border-color: var(--border2);
  background: var(--surface2);
  transform: translateY(-2px);
}

.project-card-title {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
}

.project-card-meta {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.6;
}

.project-card-stats {
  display: flex;
  gap: 12px;
  margin-top: 12px;
  font-size: 10px;
  color: var(--muted2);
}

.project-card-stats span {
  background: var(--surface2);
  padding: 3px 8px;
  border-radius: 6px;
}

.add-project-card {
  background: transparent;
  border: 1px dashed var(--border2);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 120px;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 13px;
  transition: all 0.15s;
}

.add-project-card:hover { border-color: var(--accent); color: var(--accent); }

/* ── Board view ── */
.board {
  display: flex;
  gap: 14px;
  padding: 24px 28px;
  align-items: flex-start;
  min-height: calc(100vh - 65px);
}

.column {
  flex: 1;
  min-width: 240px;
  max-width: 320px;
}

.column-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  margin-bottom: 10px;
}

.column-title {
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
}

.column-count {
  font-size: 11px;
  color: var(--muted);
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 10px;
}

.column-body {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 80px;
}

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  position: relative;
}

.card:hover {
  border-color: var(--border2);
  background: var(--surface2);
  transform: translateY(-1px);
}

.card.done-card {
  background: var(--done-col);
  opacity: 0.6;
}

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}

.card-title {
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 600;
  line-height: 1.4;
  flex: 1;
}

/* ── Progress ── */
.progress-wrap { margin-bottom: 8px; }

.progress-track {
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 4px;
}

.progress-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
  transition: width 0.3s;
}

.progress-fill.complete { background: #4dff91; }

.progress-label { font-size: 10px; color: var(--muted); }

/* ── Card footer ── */
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
}

.card-due { font-size: 10px; color: var(--muted); }
.card-due.overdue { color: #ff6b6b; }

.card-comments {
  font-size: 10px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

.add-story-btn {
  width: 100%;
  padding: 10px;
  border: 1px dashed var(--border);
  border-radius: 10px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font-mono);
  transition: all 0.15s;
  margin-top: 4px;
}

.add-story-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Overlay + Modal ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 500;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 20px;
  overflow-y: auto;
  backdrop-filter: blur(4px);
}

.overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  width: 100%;
  max-width: 680px;
  padding: 28px;
  position: relative;
  animation: modalIn 0.18s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.modal-close {
  position: absolute;
  top: 16px;
  right: 18px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
  transition: color 0.15s;
}

.modal-close:hover { color: var(--text); }

/* ── Form elements ── */
.form-group { margin-bottom: 18px; }

.form-label {
  display: block;
  font-size: 11px;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}

.form-input, .form-textarea, .form-select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.15s;
  resize: vertical;
}

.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }

.form-textarea { min-height: 80px; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* ── Tasks section in modal ── */
.tasks-section { margin-top: 20px; }

.section-title {
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.task-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }

.task-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--surface2);
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.15s;
}

.task-row:hover { border-color: var(--border2); }

.task-check {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}

.task-text {
  flex: 1;
  font-size: 12px;
  color: var(--text);
}

.task-text.done-task { text-decoration: line-through; color: var(--muted); }

.task-expand {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 11px;
  padding: 2px 6px;
  transition: color 0.15s;
  font-family: var(--font-mono);
}

.task-expand:hover { color: var(--accent); }

.task-meta {
  font-size: 10px;
  color: var(--muted);
  display: flex;
  gap: 8px;
  align-items: center;
}

.task-delete {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  padding: 0 2px;
  transition: color 0.15s;
  line-height: 1;
}

.task-delete:hover { color: #ff6b6b; }

.add-task-row { display: flex; gap: 8px; }

.add-task-input {
  flex: 1;
  background: var(--surface2);
  border: 1px dashed var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 12px;
  outline: none;
  transition: border-color 0.15s;
}

.add-task-input:focus { border-color: var(--accent); border-style: solid; }

/* ── Comments section ── */
.comment-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }

.comment-item {
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: 8px;
  border-left: 2px solid var(--border2);
}

.comment-meta { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
.comment-body { font-size: 12px; line-height: 1.5; }

.comment-delete {
  float: right;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  transition: color 0.15s;
}

.comment-delete:hover { color: #ff6b6b; }

.add-comment-row { display: flex; gap: 8px; }

.add-comment-input {
  flex: 1;
  background: var(--surface2);
  border: 1px dashed var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 12px;
  outline: none;
  transition: border-color 0.15s;
  resize: none;
  min-height: 60px;
}

.add-comment-input:focus { border-color: var(--accent); border-style: solid; }

/* ── Modal footer ── */
.modal-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 24px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}

.btn-danger {
  background: none;
  border: 1px solid rgba(255,107,107,0.3);
  color: #ff6b6b;
  padding: 7px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font-mono);
  transition: all 0.15s;
}

.btn-danger:hover { background: rgba(255,107,107,0.1); border-color: #ff6b6b; }

.modal-actions { display: flex; gap: 8px; }

/* ── Confirm dialog ── */
.confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 600;
  justify-content: center;
  align-items: center;
}

.confirm-overlay.open { display: flex; }

.confirm-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 28px;
  max-width: 360px;
  width: 100%;
  text-align: center;
}

.confirm-box h3 { font-family: var(--font-head); font-size: 16px; margin-bottom: 10px; }
.confirm-box p  { font-size: 12px; color: var(--muted2); margin-bottom: 20px; line-height: 1.5; }
.confirm-actions { display: flex; gap: 10px; justify-content: center; }

/* ── Breadcrumb ── */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--muted);
}

.breadcrumb a {
  color: var(--muted2);
  text-decoration: none;
  transition: color 0.15s;
  cursor: pointer;
}

.breadcrumb a:hover { color: var(--accent); }

.breadcrumb .sep { color: var(--muted); }

.breadcrumb .current {
  color: var(--text);
  font-weight: 500;
}

/* ── Empty state ── */
.empty { font-size: 11px; color: var(--muted); text-align: center; padding: 20px 0; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #444; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--accent);
  border-radius: 8px;
  padding: 12px 18px;
  font-size: 12px;
  color: var(--text);
  z-index: 900;
  animation: toastIn 0.2s ease;
  pointer-events: none;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Context path display ── */
.project-context-path {
  font-size: 10px;
  color: var(--muted);
  margin-top: 6px;
  word-break: break-all;
}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()"><span>/</span>projects</div>
  <div class="header-controls" id="header-controls"></div>
</header>

<main id="app"></main>

<!-- Story modal -->
<div class="overlay" id="story-overlay">
  <div class="modal" id="story-modal">
    <button class="modal-close" onclick="closeStoryModal()">&times;</button>

    <div class="form-group">
      <label class="form-label">Story title</label>
      <input class="form-input" id="m-title" type="text" placeholder="What are you building?">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select form-input" id="m-status">
          <option value="Backlog">Backlog</option>
          <option value="Prioritised">Prioritised</option>
          <option value="In Progress">In Progress</option>
          <option value="Parked">Parked</option>
          <option value="Done">Done</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Due date</label>
        <input class="form-input" id="m-due" type="date">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="m-desc" placeholder="What's this about? Goals, context, links..."></textarea>
    </div>

    <!-- Tasks -->
    <div class="tasks-section">
      <div class="section-title">Tasks</div>
      <div class="task-list" id="m-task-list"></div>
      <div class="add-task-row">
        <input class="add-task-input" id="new-task-input" type="text" placeholder="Add a task and press Enter...">
        <button class="btn" onclick="addTask()">Add</button>
      </div>
    </div>

    <!-- Story Comments -->
    <div class="tasks-section" style="margin-top:20px;">
      <div class="section-title">Comments</div>
      <div class="comment-list" id="m-comment-list"></div>
      <div class="add-comment-row">
        <textarea class="add-comment-input" id="new-comment-input" placeholder="Add a note or comment..."></textarea>
        <button class="btn" onclick="addStoryComment()">Add</button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-danger" id="m-delete-btn" onclick="confirmDeleteStory()">Delete story</button>
      <div class="modal-actions">
        <button class="btn" onclick="closeStoryModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveStory()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Task detail modal -->
<div class="overlay" id="task-overlay">
  <div class="modal" id="task-modal" style="max-width:520px;">
    <button class="modal-close" onclick="closeTaskModal()">&times;</button>

    <div class="form-group">
      <label class="form-label">Task</label>
      <input class="form-input" id="t-text" type="text" placeholder="Task name">
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="t-desc" placeholder="Details, notes, acceptance criteria..."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Due date</label>
        <input class="form-input" id="t-due" type="date">
      </div>
      <div class="form-group" style="display:flex;align-items:flex-end;">
        <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted2);cursor:pointer;">
          <input type="checkbox" id="t-done" style="accent-color:var(--accent);width:16px;height:16px;">
          Mark as done
        </label>
      </div>
    </div>

    <!-- Task Comments -->
    <div class="tasks-section" style="margin-top:20px;">
      <div class="section-title">Comments</div>
      <div class="comment-list" id="t-comment-list"></div>
      <div class="add-comment-row">
        <textarea class="add-comment-input" id="new-task-comment-input" placeholder="Add a comment..."></textarea>
        <button class="btn" onclick="addTaskComment()">Add</button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-danger" onclick="deleteCurrentTask()">Delete task</button>
      <div class="modal-actions">
        <button class="btn" onclick="closeTaskModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveTask()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Project modal -->
<div class="overlay" id="project-overlay">
  <div class="modal" id="project-modal" style="max-width:480px;">
    <button class="modal-close" onclick="closeProjectModal()">&times;</button>

    <div class="form-group">
      <label class="form-label">Project name</label>
      <input class="form-input" id="p-name" type="text" placeholder="e.g. GA4 Plugin, Client Audit">
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="p-desc" placeholder="What's this project about?"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Context folder path</label>
      <input class="form-input" id="p-context" type="text" placeholder="e.g. projects/ga4-plugin/">
    </div>

    <div class="modal-footer">
      <button class="btn-danger" id="p-delete-btn" onclick="confirmDeleteProject()">Delete project</button>
      <div class="modal-actions">
        <button class="btn" onclick="closeProjectModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveProject()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3 id="confirm-title">Delete?</h3>
    <p id="confirm-message">This action cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn" onclick="closeConfirm()">Cancel</button>
      <button class="btn-danger" onclick="executeConfirm()">Delete</button>
    </div>
  </div>
</div>

<script>
// ── Data layer ──────────────────────────────────────────────
const STORAGE_KEY = 'dotfound_kanban_v2';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // Migrate from v1 if exists
  return migrateV1() || { projects: [] };
}

function migrateV1() {
  try {
    const raw = localStorage.getItem('dotfound_kanban_v1');
    if (!raw) return null;
    const v1 = JSON.parse(raw);
    if (!v1.stories || v1.stories.length === 0) return null;
    // Create a single project from v1 data
    const project = {
      id: newId(),
      name: 'Migrated Project',
      description: 'Stories migrated from previous board',
      contextPath: '',
      createdAt: new Date().toISOString(),
      stories: v1.stories.map(s => ({
        ...s,
        tasks: (s.tasks || []).map(t => ({
          id: t.id || newId(),
          text: t.text,
          description: '',
          due: '',
          done: t.done || false,
          comments: [],
        })),
      })),
    };
    const data = { projects: [project] };
    saveData(data);
    return data;
  } catch(e) {
    return null;
  }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function exportData() {
  const data = loadData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'projects-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function newId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

// ── Columns ─────────────────────────────────────────────────
const COLUMNS = [
  { id: 'Backlog',     label: 'Backlog' },
  { id: 'Prioritised', label: 'Prioritised' },
  { id: 'In Progress', label: 'In Progress' },
  { id: 'Parked',      label: 'Parked' },
  { id: 'Done',        label: 'Done' },
];

// ── App state ───────────────────────────────────────────────
let currentView = 'home'; // 'home' or 'board'
let currentProjectId = null;

// Story modal state
let currentStoryId = null;
let modalTasks = [];
let modalComments = [];

// Task modal state
let currentTaskIndex = null;
let taskModalComments = [];

// Confirm state
let confirmAction = null;

// ── Routing ─────────────────────────────────────────────────
function goHome() {
  currentView = 'home';
  currentProjectId = null;
  renderApp();
}

function openBoard(projectId) {
  currentView = 'board';
  currentProjectId = projectId;
  renderApp();
}

// ── Render app ──────────────────────────────────────────────
function renderApp() {
  const app = document.getElementById('app');
  const controls = document.getElementById('header-controls');

  if (currentView === 'home') {
    renderHome(app);
    controls.innerHTML = `
      <button class="btn" onclick="exportData()">&#8595; Export</button>
      <button class="btn btn-primary" onclick="openNewProjectModal()">+ New project</button>
    `;
  } else {
    renderBoard(app);
    renderBoardControls(controls);
  }
}

// ── Home view ───────────────────────────────────────────────
function renderHome(container) {
  const data = loadData();
  let html = '<div class="projects-view"><h2>Your projects</h2><div class="projects-grid">';

  data.projects.forEach(p => {
    const stories = p.stories || [];
    const inProgress = stories.filter(s => s.status === 'In Progress').length;
    const total = stories.length;
    const done = stories.filter(s => s.status === 'Done').length;

    html += `
      <div class="project-card" onclick="openBoard('${p.id}')">
        <div class="project-card-title">${esc(p.name)}</div>
        <div class="project-card-meta">${esc(p.description || 'No description')}</div>
        ${p.contextPath ? `<div class="project-context-path">${esc(p.contextPath)}</div>` : ''}
        <div class="project-card-stats">
          <span>${total} stories</span>
          <span>${inProgress} in progress</span>
          <span>${done} done</span>
        </div>
      </div>`;
  });

  html += `<div class="add-project-card" onclick="openNewProjectModal()">+ New project</div>`;
  html += '</div></div>';
  container.innerHTML = html;
}

// ── Board view ──────────────────────────────────────────────
function renderBoard(container) {
  const data = loadData();
  const project = data.projects.find(p => p.id === currentProjectId);
  if (!project) { goHome(); return; }

  const stories = project.stories || [];
  let html = '<div class="board" id="board">';

  COLUMNS.forEach(col => {
    const colStories = stories.filter(s => s.status === col.id);
    html += `<div class="column">
      <div class="column-header">
        <span class="column-title">${col.label}</span>
        <span class="column-count">${colStories.length}</span>
      </div>
      <div class="column-body">`;

    if (colStories.length === 0) {
      html += '<div class="empty">No stories</div>';
    } else {
      colStories.forEach(s => {
        const tasks = s.tasks || [];
        const tasksDone = tasks.filter(t => t.done).length;
        const tasksTotal = tasks.length;
        const pct = tasksTotal > 0 ? Math.round((tasksDone / tasksTotal) * 100) : 0;
        const complete = tasksDone === tasksTotal && tasksTotal > 0;
        const dueStr = s.due ? formatDue(s.due) : '';
        const dueClass = s.due && new Date(s.due) < new Date() && s.status !== 'Done' ? 'overdue' : '';
        const comments = s.comments || [];

        html += `<div class="card${s.status === 'Done' ? ' done-card' : ''}" onclick="openStory('${s.id}')">
          <div class="card-top">
            <span class="card-title">${esc(s.title)}</span>
          </div>`;

        if (tasksTotal > 0) {
          html += `<div class="progress-wrap">
            <div class="progress-track">
              <div class="progress-fill${complete ? ' complete' : ''}" style="width:${pct}%"></div>
            </div>
            <span class="progress-label">${tasksDone}/${tasksTotal} tasks</span>
          </div>`;
        }

        html += `<div class="card-footer">
            <span class="card-due ${dueClass}">${dueStr}</span>
            ${comments.length > 0 ? `<span class="card-comments">&#128172; ${comments.length}</span>` : ''}
          </div>
        </div>`;
      });
    }

    if (col.id !== 'Done') {
      html += `<button class="add-story-btn" onclick="openNewStoryModal('${col.id}')">+ Add story</button>`;
    }

    html += '</div></div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

function renderBoardControls(controls) {
  const data = loadData();
  const project = data.projects.find(p => p.id === currentProjectId);
  if (!project) return;

  let selectHtml = '<select class="filter-select" id="board-switcher" onchange="switchBoard(this.value)">';
  data.projects.forEach(p => {
    selectHtml += `<option value="${p.id}" ${p.id === currentProjectId ? 'selected' : ''}>${esc(p.name)}</option>`;
  });
  selectHtml += '</select>';

  controls.innerHTML = `
    ${selectHtml}
    <button class="btn" onclick="editCurrentProject()">&#9881; Settings</button>
    <button class="btn" onclick="exportData()">&#8595; Export</button>
    <button class="btn btn-primary" onclick="openNewStoryModal()">+ New story</button>
  `;
}

function switchBoard(projectId) {
  openBoard(projectId);
}

// ── Project modal ───────────────────────────────────────────
let editingProjectId = null;

function openNewProjectModal() {
  editingProjectId = null;
  document.getElementById('p-name').value = '';
  document.getElementById('p-desc').value = '';
  document.getElementById('p-context').value = '';
  document.getElementById('p-delete-btn').style.display = 'none';
  document.getElementById('project-overlay').classList.add('open');
  document.getElementById('p-name').focus();
}

function editCurrentProject() {
  const data = loadData();
  const project = data.projects.find(p => p.id === currentProjectId);
  if (!project) return;

  editingProjectId = project.id;
  document.getElementById('p-name').value = project.name || '';
  document.getElementById('p-desc').value = project.description || '';
  document.getElementById('p-context').value = project.contextPath || '';
  document.getElementById('p-delete-btn').style.display = '';
  document.getElementById('project-overlay').classList.add('open');
  document.getElementById('p-name').focus();
}

function closeProjectModal() {
  document.getElementById('project-overlay').classList.remove('open');
  editingProjectId = null;
}

function saveProject() {
  const name = document.getElementById('p-name').value.trim();
  if (!name) { document.getElementById('p-name').focus(); return; }

  const data = loadData();
  const now = new Date().toISOString();

  if (editingProjectId) {
    const idx = data.projects.findIndex(p => p.id === editingProjectId);
    if (idx !== -1) {
      data.projects[idx].name = name;
      data.projects[idx].description = document.getElementById('p-desc').value.trim();
      data.projects[idx].contextPath = document.getElementById('p-context').value.trim();
    }
  } else {
    const newProject = {
      id: newId(),
      name,
      description: document.getElementById('p-desc').value.trim(),
      contextPath: document.getElementById('p-context').value.trim(),
      createdAt: now,
      stories: [],
    };
    data.projects.push(newProject);
    // Auto-open the new board
    currentProjectId = newProject.id;
    currentView = 'board';
  }

  saveData(data);
  closeProjectModal();
  renderApp();
  showToast('Project saved');
}

function confirmDeleteProject() {
  document.getElementById('confirm-title').textContent = 'Delete project?';
  document.getElementById('confirm-message').textContent = 'This will permanently remove the project and all its stories.';
  confirmAction = () => {
    const data = loadData();
    data.projects = data.projects.filter(p => p.id !== editingProjectId);
    saveData(data);
    closeConfirm();
    closeProjectModal();
    goHome();
    showToast('Project deleted');
  };
  document.getElementById('confirm-overlay').classList.add('open');
}

// ── Story modal ─────────────────────────────────────────────
function openNewStoryModal(defaultStatus = 'Backlog') {
  currentStoryId = null;
  modalTasks = [];
  modalComments = [];

  document.getElementById('m-title').value = '';
  document.getElementById('m-status').value = defaultStatus;
  document.getElementById('m-desc').value = '';
  document.getElementById('m-due').value = '';
  document.getElementById('m-delete-btn').style.display = 'none';

  renderModalTasks();
  renderModalComments();
  document.getElementById('story-overlay').classList.add('open');
  document.getElementById('m-title').focus();
}

function openStory(id) {
  const data = loadData();
  const project = data.projects.find(p => p.id === currentProjectId);
  if (!project) return;
  const story = (project.stories || []).find(s => s.id === id);
  if (!story) return;

  currentStoryId = id;
  modalTasks = (story.tasks || []).map(t => ({...t, comments: (t.comments || []).map(c => ({...c}))}));
  modalComments = (story.comments || []).map(c => ({...c}));

  document.getElementById('m-title').value = story.title || '';
  document.getElementById('m-status').value = story.status || 'Backlog';
  document.getElementById('m-desc').value = story.description || '';
  document.getElementById('m-due').value = story.due || '';
  document.getElementById('m-delete-btn').style.display = '';

  renderModalTasks();
  renderModalComments();
  document.getElementById('story-overlay').classList.add('open');
}

function closeStoryModal() {
  document.getElementById('story-overlay').classList.remove('open');
  currentStoryId = null;
}

function saveStory() {
  const title = document.getElementById('m-title').value.trim();
  if (!title) { document.getElementById('m-title').focus(); return; }

  const data = loadData();
  const project = data.projects.find(p => p.id === currentProjectId);
  if (!project) return;
  if (!project.stories) project.stories = [];

  const now = new Date().toISOString();
  const storyData = {
    title,
    status: document.getElementById('m-status').value,
    description: document.getElementById('m-desc').value.trim(),
    due: document.getElementById('m-due').value,
    tasks: modalTasks,
    comments: modalComments,
    updatedAt: now,
  };

  if (currentStoryId) {
    const idx = project.stories.findIndex(s => s.id === currentStoryId);
    if (idx !== -1) {
      project.stories[idx] = { ...project.stories[idx], ...storyData };
    }
  } else {
    project.stories.push({ id: newId(), createdAt: now, ...storyData });
  }

  saveData(data);
  closeStoryModal();
  renderApp();
  showToast('Story saved');
}

function confirmDeleteStory() {
  document.getElementById('confirm-title').textContent = 'Delete story?';
  document.getElementById('confirm-message').textContent = 'This will permanently remove the story and all its tasks and comments.';
  confirmAction = () => {
    const data = loadData();
    const project = data.projects.find(p => p.id === currentProjectId);
    if (project) {
      project.stories = (project.stories || []).filter(s => s.id !== currentStoryId);
      saveData(data);
    }
    closeConfirm();
    closeStoryModal();
    renderApp();
    showToast('Story deleted');
  };
  document.getElementById('confirm-overlay').classList.add('open');
}

// ── Story tasks ─────────────────────────────────────────────
function renderModalTasks() {
  const list = document.getElementById('m-task-list');
  if (modalTasks.length === 0) {
    list.innerHTML = '<div class="empty">No tasks yet</div>';
    return;
  }
  list.innerHTML = modalTasks.map((t, i) => {
    const commentCount = (t.comments || []).length;
    const dueStr = t.due ? formatDue(t.due) : '';
    const dueClass = t.due && new Date(t.due) < new Date() && !t.done ? 'overdue' : '';
    const hasDetail = t.description || t.due || commentCount > 0;

    return `<div class="task-row" onclick="openTaskModal(${i}, event)">
      <input type="checkbox" class="task-check" ${t.done ? 'checked' : ''} onclick="event.stopPropagation()" onchange="toggleTask(${i})">
      <div style="flex:1;min-width:0;">
        <div class="task-text${t.done ? ' done-task' : ''}">${esc(t.text)}</div>
        ${hasDetail ? `<div class="task-meta">
          ${dueStr ? `<span class="card-due ${dueClass}">${dueStr}</span>` : ''}
          ${commentCount > 0 ? `<span>&#128172; ${commentCount}</span>` : ''}
          ${t.description ? '<span>&#128196;</span>' : ''}
        </div>` : ''}
      </div>
      <button class="task-delete" onclick="event.stopPropagation(); deleteTask(${i})">&times;</button>
    </div>`;
  }).join('');
}

function addTask() {
  const input = document.getElementById('new-task-input');
  const text = input.value.trim();
  if (!text) return;
  modalTasks.push({ id: newId(), text, description: '', due: '', done: false, comments: [] });
  input.value = '';
  renderModalTasks();
  input.focus();
}

function toggleTask(i) {
  modalTasks[i].done = !modalTasks[i].done;
  renderModalTasks();
}

function deleteTask(i) {
  modalTasks.splice(i, 1);
  renderModalTasks();
}

document.getElementById('new-task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

// ── Task detail modal ───────────────────────────────────────
function openTaskModal(index, event) {
  if (event) event.stopPropagation();
  currentTaskIndex = index;
  const task = modalTasks[index];
  if (!task) return;

  taskModalComments = (task.comments || []).map(c => ({...c}));

  document.getElementById('t-text').value = task.text || '';
  document.getElementById('t-desc').value = task.description || '';
  document.getElementById('t-due').value = task.due || '';
  document.getElementById('t-done').checked = task.done || false;

  renderTaskComments();
  document.getElementById('task-overlay').classList.add('open');
}

function closeTaskModal() {
  document.getElementById('task-overlay').classList.remove('open');
  currentTaskIndex = null;
}

function saveTask() {
  if (currentTaskIndex === null) return;
  const task = modalTasks[currentTaskIndex];
  if (!task) return;

  task.text = document.getElementById('t-text').value.trim() || task.text;
  task.description = document.getElementById('t-desc').value.trim();
  task.due = document.getElementById('t-due').value;
  task.done = document.getElementById('t-done').checked;
  task.comments = taskModalComments;

  closeTaskModal();
  renderModalTasks();
}

function deleteCurrentTask() {
  if (currentTaskIndex === null) return;
  modalTasks.splice(currentTaskIndex, 1);
  closeTaskModal();
  renderModalTasks();
}

// ── Task comments ───────────────────────────────────────────
function renderTaskComments() {
  const list = document.getElementById('t-comment-list');
  if (taskModalComments.length === 0) {
    list.innerHTML = '<div class="empty">No comments yet</div>';
    return;
  }
  list.innerHTML = taskModalComments.map((c, i) => `
    <div class="comment-item">
      <button class="comment-delete" onclick="deleteTaskComment(${i})">&times;</button>
      <div class="comment-meta">${c.date}</div>
      <div class="comment-body">${esc(c.text)}</div>
    </div>`).join('');
}

function addTaskComment() {
  const input = document.getElementById('new-task-comment-input');
  const text = input.value.trim();
  if (!text) return;
  const now = new Date();
  taskModalComments.push({
    id: newId(),
    text,
    date: now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' }) +
          ' ' + now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
  });
  input.value = '';
  renderTaskComments();
}

function deleteTaskComment(i) {
  taskModalComments.splice(i, 1);
  renderTaskComments();
}

// ── Story comments ──────────────────────────────────────────
function renderModalComments() {
  const list = document.getElementById('m-comment-list');
  if (modalComments.length === 0) {
    list.innerHTML = '<div class="empty">No comments yet</div>';
    return;
  }
  list.innerHTML = modalComments.map((c, i) => `
    <div class="comment-item">
      <button class="comment-delete" onclick="deleteStoryComment(${i})">&times;</button>
      <div class="comment-meta">${c.date}</div>
      <div class="comment-body">${esc(c.text)}</div>
    </div>`).join('');
}

function addStoryComment() {
  const input = document.getElementById('new-comment-input');
  const text = input.value.trim();
  if (!text) return;
  const now = new Date();
  modalComments.push({
    id: newId(),
    text,
    date: now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' }) +
          ' ' + now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
  });
  input.value = '';
  renderModalComments();
}

function deleteStoryComment(i) {
  modalComments.splice(i, 1);
  renderModalComments();
}

// ── Confirm dialog ──────────────────────────────────────────
function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('open');
  confirmAction = null;
}

function executeConfirm() {
  if (confirmAction) confirmAction();
}

// ── Utilities ───────────────────────────────────────────────
function formatDue(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── Keyboard / click outside ────────────────────────────────
document.getElementById('story-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeStoryModal();
});

document.getElementById('task-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeTaskModal();
});

document.getElementById('project-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeProjectModal();
});

document.getElementById('confirm-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeConfirm();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('confirm-overlay').classList.contains('open')) {
      closeConfirm();
    } else if (document.getElementById('task-overlay').classList.contains('open')) {
      closeTaskModal();
    } else if (document.getElementById('story-overlay').classList.contains('open')) {
      closeStoryModal();
    } else if (document.getElementById('project-overlay').classList.contains('open')) {
      closeProjectModal();
    }
  }
});

// Handle Enter in task comment input
document.getElementById('new-task-comment-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTaskComment(); }
});

document.getElementById('new-comment-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addStoryComment(); }
});

// ── Boot ─────────────────────────────────────────────────────
renderApp();
</script>
</body>
</html>
